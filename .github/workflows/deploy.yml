name: WorkQuest AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Build Frontend Client
      - name: Install Frontend Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint Frontend
        run: npm run lint
        continue-on-error: true

      - name: Compile Next.js App
        run: npm run build

      # Build Express Backend Server
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Compile Express Server
        run: |
          cd backend
          npm run build

      # Setup Docker Image artifact build tests
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Local test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: workquest-ai:latest
